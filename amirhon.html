<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amirhon UI PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    overflow-x: hidden;
}

/* 🌈 animated background */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: conic-gradient(
        from 0deg,
        #22d3ee,
        #a78bfa,
        #f472b6,
        #22d3ee
    );
    animation: rotateBg 20s linear infinite;
    z-index: -2;
    opacity: 0.08;
}

@keyframes rotateBg {
    100% { transform: rotate(360deg); }
}

/* blur orbs */
.bg-blur {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.7;
    z-index: -1;
    animation: float 8s ease-in-out infinite;
}

.blur-1 { background: #8b5cf6; top: 10%; left: 5%; }
.blur-2 { background: #06b6d4; right: 8%; bottom: 10%; }

@keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-40px); }
}

/* header */
header {
    padding: 25px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: 900;
}

.logo span {
    color: #22d3ee;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #cbd5e1;
    transition: 0.3s;
}

nav a:hover {
    color: #22d3ee;
}

/* hero */
.hero {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    align-items: center;
    padding: 40px 8%;
    gap: 40px;
}

.badge {
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    display: inline-block;
    margin-bottom: 20px;
}

/* 🔥 animated gradient text */
h1 {
    font-size: clamp(40px, 7vw, 80px);
    margin-bottom: 20px;
}

h1 span {
    background: linear-gradient(90deg, #22d3ee, #a78bfa, #f472b6);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientMove 4s linear infinite;
}

@keyframes gradientMove {
    100% { background-position: 200%; }
}

p {
    color: #94a3b8;
    margin-bottom: 25px;
    max-width: 500px;
}

/* buttons */
.btn {
    padding: 14px 24px;
    border-radius: 12px;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
}

.btn-primary {
    background: linear-gradient(90deg, #22d3ee, #a78bfa);
    color: black;
}

.btn-primary:hover {
    transform: scale(1.1);
}

.btn-secondary {
    border: 1px solid rgba(255,255,255,0.2);
}

/* 💎 glass card */
.card {
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.4s;
}

.card:hover {
    transform: rotateY(8deg) rotateX(5deg) scale(1.05);
}

/* profile */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22d3ee, #a78bfa);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
    margin-bottom: 20px;
}

/* stats */
.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.stat {
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    text-align: center;
}

.stat strong {
    color: #22d3ee;
}

/* responsive */
@media(max-width: 850px){
    .hero { grid-template-columns: 1fr; }
    nav { display: none; }
}
</style>
</head>

<body>

<div class="bg-blur blur-1"></div>
<div class="bg-blur blur-2"></div>

<header>
    <div class="logo">Amir<span>hon</span></div>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
    </nav>
</header>

<main class="hero">
    <section>
        <div class="badge">🔥 Next Level UI</div>

        <h1>Salom, men <span id="typing"></span></h1>

        <p>
            Bu UI oddiy emas — animation, interaction va zamonaviy dizayn bilan to‘liq premium daraja.
        </p>

        <a href="#" class="btn btn-primary">Boshlash</a>
    </section>

    <section class="card" id="card">
        <div class="profile">A</div>
        <h2>Amirhon UI</h2>
        <p>Professional, modern va interactive dizayn.</p>

        <div class="stats">
            <div class="stat"><strong>99%</strong><span>Design</span></div>
            <div class="stat"><strong>24+</strong><span>Projects</span></div>
            <div class="stat"><strong>100%</strong><span>Responsive</span></div>
        </div>
    </section>
</main>

<script>
/* ✨ typing effect */
const text = "Amirhon";
let i = 0;
function typing() {
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 120);
    }
}
typing();

/* 🖱️ parallax tilt */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.clientX) / 25;
    let y = (window.innerHeight / 2 - e.clientY) / 25;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
